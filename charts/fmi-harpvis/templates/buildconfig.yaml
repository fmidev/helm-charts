apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: {{ .Values.sftp.image.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sftp-puller.labels" . | nindent 4 }}
spec:
  source:
    type: Dockerfile
    dockerfile: |
      FROM alpine:{{ .Values.sftp.image.tag }}
      RUN apk add --no-cache openssh-client
  strategy:
    type: Docker
    dockerStrategy: {}
  output:
    to:
      kind: ImageStreamTag
      name: {{ .Values.sftp.image.name }}:latest
  triggers:
  - type: ConfigChange
