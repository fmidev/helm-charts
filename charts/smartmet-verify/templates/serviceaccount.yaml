{{- if and .Values.serviceAccount.create (or .Values.gui.enabled .Values.runner.enabled) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "smartmet-verify.serviceAccountName" . }}
  labels:
    {{- include "smartmet-verify.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
