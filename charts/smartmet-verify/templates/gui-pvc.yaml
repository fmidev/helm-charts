{{- if and .Values.gui.enabled .Values.gui.persistence.logs.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "smartmet-verify.componentFullname" (list . "gui") }}-logs
  labels:
    {{- include "smartmet-verify.componentLabels" (list . "gui") | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.gui.persistence.logs.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.gui.persistence.logs.size }}
  {{- if .Values.gui.persistence.logs.storageClassName }}
  storageClassName: {{ .Values.gui.persistence.logs.storageClassName }}
  {{- end }}
{{- end }}
