{{- if .Values.gui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smartmet-verify.componentFullname" (list . "gui") }}
  labels:
    {{- include "smartmet-verify.componentLabels" (list . "gui") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.gui.replicaCount }}
  selector:
    matchLabels:
      {{- include "smartmet-verify.componentSelectorLabels" (list . "gui") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartmet-verify.componentSelectorLabels" (list . "gui") | nindent 8 }}
        {{- with .Values.gui.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.gui.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "smartmet-verify.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gui
          image: {{ include "smartmet-verify.image" (list . .Values.gui.image) }}
          imagePullPolicy: {{ .Values.gui.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.gui.service.port }}
              protocol: TCP
          {{- $env := concat .Values.gui.env .Values.gui.extraEnv }}
          {{- if $env }}
          env:
            {{- toYaml $env | nindent 12 }}
          {{- end }}
          {{- $envFrom := list }}
          {{- if eq .Values.gui.config.mode "env" }}
            {{- range .Values.gui.config.envFrom.configMapRefs }}
              {{- $envFrom = append $envFrom (dict "configMapRef" (dict "name" .)) }}
            {{- end }}
            {{- range .Values.gui.config.envFrom.secretRefs }}
              {{- $envFrom = append $envFrom (dict "secretRef" (dict "name" .)) }}
            {{- end }}
          {{- end }}
          {{- range .Values.gui.extraEnvFrom }}
            {{- $envFrom = append $envFrom . }}
          {{- end }}
          {{- if $envFrom }}
          envFrom:
            {{- toYaml $envFrom | nindent 12 }}
          {{- end }}
          {{- if .Values.gui.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.gui.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.gui.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.gui.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.gui.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.gui.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.gui.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.gui.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.gui.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.gui.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.gui.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.gui.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.gui.resources | nindent 12 }}
          {{- $hasConfigMount := and (eq .Values.gui.config.mode "secretFile") .Values.gui.config.secretFile.secretName }}
          {{- if or $hasConfigMount .Values.gui.persistence.logs.enabled .Values.global.extraVolumeMounts .Values.gui.extraVolumeMounts }}
          volumeMounts:
            {{- if $hasConfigMount }}
            - name: gui-config
              mountPath: {{ printf "%s/%s" .Values.gui.config.secretFile.mountPath .Values.gui.config.secretFile.fileName }}
              subPath: {{ .Values.gui.config.secretFile.secretKey }}
              readOnly: true
            {{- end }}
            {{- if .Values.gui.persistence.logs.enabled }}
            - name: gui-logs
              mountPath: {{ .Values.gui.persistence.logs.mountPath }}
            {{- end }}
            {{- with .Values.global.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.gui.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or $hasConfigMount .Values.gui.persistence.logs.enabled .Values.global.extraVolumes .Values.gui.extraVolumes }}
      volumes:
        {{- if $hasConfigMount }}
        - name: gui-config
          secret:
            secretName: {{ .Values.gui.config.secretFile.secretName }}
        {{- end }}
        {{- if .Values.gui.persistence.logs.enabled }}
        - name: gui-logs
          persistentVolumeClaim:
            claimName: {{ include "smartmet-verify.componentFullname" (list . "gui") }}-logs
        {{- end }}
        {{- with .Values.global.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.gui.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.gui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
