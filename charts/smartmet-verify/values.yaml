nameOverride: ""
fullnameOverride: ""

commonLabels: {}
commonAnnotations: {}

imagePullSecrets: []
# Example:
# imagePullSecrets:
#   - name: container-registry-pull-secret

serviceAccount:
  create: true
  name: ""
  annotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

global:
  imageRegistry: ""
  extraVolumes: []
  extraVolumeMounts: []

gui:
  enabled: false

  replicaCount: 1

  image:
    repository: quay.io/fmi/fmi-verification-gui
    tag: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      memory: 3Gi
      cpu: 2
    limits:
      memory: 3Gi
      cpu: 2

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podAnnotations: {}
  podLabels: {}

  springProfile: production

  env:
    - name: TZ
      value: "UTC"
    - name: JAVA_TOOL_OPTIONS
      value: "-DproductionMode=true -Dvaadin.productionMode -XX:ActiveProcessorCount=2"
    - name: JAVA_OPTS
      value: "-Duser.timezone=UTC -Dspring.config.additional-location=/var/app/config/"
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []

  config:
    # Supported modes:
    # - secretFile: mount one file from a Secret, e.g. application.yaml
    # - env: import env vars from Secret/ConfigMap
    # - none: do nothing
    mode: secretFile

    secretFile:
      secretName: ""
      secretKey: application.yaml
      mountPath: /var/app/config
      fileName: application.yaml

    envFrom:
      secretRefs: []
      configMapRefs: []

  persistence:
    logs:
      enabled: false
      accessModes:
        - ReadWriteOnce
      size: 5Gi
      storageClassName: ""
      mountPath: /var/log/tomcat

  # Writable /tmp mounted as emptyDir. Required when readOnlyRootFilesystem is
  # true (the default) because Tomcat and the JVM need to write to /tmp.
  tmpDir:
    enabled: true

  # Spring Boot Actuator management port. The app exposes /actuator/health on
  # this port (separate from the main HTTP port so Spring Security does not
  # apply). Must match management.server.port in the app's application.yaml.
  managementPort: 8081

  # Probe action. By default httpGet against the management port.
  # Set one of `httpGet`, `tcpSocket` or `exec` to override.
  probes:
    liveness:
      enabled: true
      httpGet:
        path: /actuator/health/liveness
        port: management
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    readiness:
      enabled: true
      httpGet:
        path: /actuator/health/readiness
        port: management
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6

  ingress:
    enabled: false
    className: ""
    annotations: {}
    customAnnotations: {}
    hosts:
      - host: smartmet-verify-gui.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  route:
    enabled: false
    annotations: {}
    host: ""
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

runner:
  enabled: false

  replicaCount: 1

  image:
    repository: quay.io/fmi/fmi-verification-runner
    tag: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      memory: 6Gi
      cpu: 2
    limits:
      memory: 6Gi
      cpu: 2

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podAnnotations: {}
  podLabels: {}

  springProfile: production

  env:
    - name: TZ
      value: "UTC"
    - name: JAVA_TOOL_OPTIONS
      value: "-DproductionMode=true -XX:ActiveProcessorCount=2"
    - name: JAVA_OPTS
      value: "-Duser.timezone=UTC -Dspring.config.additional-location=/var/app/config/"
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []

  config:
    mode: secretFile

    secretFile:
      secretName: ""
      secretKey: application.yaml
      mountPath: /var/app/config
      fileName: application.yaml

    envFrom:
      secretRefs: []
      configMapRefs: []

  persistence:
    logs:
      enabled: false
      accessModes:
        - ReadWriteOnce
      size: 5Gi
      storageClassName: ""
      mountPath: /var/log/tomcat

  tmpDir:
    enabled: true

  # Spring Boot Actuator management port. Must match management.server.port
  # in the app's application.yaml.
  managementPort: 8081

  # Probe action. By default httpGet against the management port.
  # Set one of `httpGet`, `tcpSocket` or `exec` to override.
  probes:
    liveness:
      enabled: true
      httpGet:
        path: /actuator/health/liveness
        port: management
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 6
    readiness:
      enabled: true
      httpGet:
        path: /actuator/health/readiness
        port: management
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 6

# Optional PostgreSQL/PostGIS database managed by the CloudNativePG operator.
#
# The operator itself is NOT installed by this chart. Before setting
# `database.enabled: true` you must install CloudNativePG (see README).
#
# The fields under `spec` are passed through to the `Cluster` resource verbatim,
# so anything the CNPG API supports can be configured from here.
database:
  enabled: false

  # Cluster name. Also becomes the stem of the CNPG-generated services
  # (`<name>-rw`, `<name>-ro`, `<name>-r`). Applications that use a different
  # hostname (e.g. `verification-db`) can add an alias via
  # `database.spec.managed.services.additional`.
  name: verification-db

  spec:
    instances: 1
    imageName: ghcr.io/cloudnative-pg/postgis:16-3.4

    env:
      - name: TZ
        value: UTC

    postgresql:
      parameters:
        timezone: UTC
        log_timezone: UTC

    storage:
      size: 20Gi
      # storageClass: ""

    # By keeping `owner: app` the operator creates a throw-away `app` role,
    # which lets pre-init SQL CREATE ROLE verifadmin without colliding.
    # A post-init SQL should transfer ownership of the application database
    # to verifadmin before the production schema runs.
    bootstrap:
      initdb:
        database: verifapi
        owner: app
        # References to ConfigMap/Secret keys containing SQL scripts.
        # Supply these as existing ConfigMaps — the chart does not vendor
        # the SmartMet Verify schema.
        postInitSQLRefs:
          configMapRefs: []
          # - name: verification-db-init-sql
          #   key: 0000-pre-init.sql
        postInitApplicationSQLRefs:
          configMapRefs: []
          # - name: verification-db-init-sql
          #   key: 0002-post-ownership.sql
          # - name: verification-db-init-sql
          #   key: 0001-production-schema.sql

    # managed.roles and managed.services below give applications access to the
    # DB under their expected role names and service hostnames.
    managed:
      roles: []
      # - name: verifwww
      #   ensure: present
      #   login: true
      #   inherit: true
      #   inRoles:
      #     - verif_ro
      #   passwordSecret:
      #     name: verification-db-verifwww
      services:
        additional: []
        # - selectorType: rw
        #   serviceTemplate:
        #     metadata:
        #       name: verification-db
