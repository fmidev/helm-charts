{{- if .Values.smartmetConf.avi.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "smartmetserver.fullname" . }}-avi-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "smartmetserver.labels.component" (merge (dict "component" "configuration") .) | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  avi-engine.conf: |
    // SmartMet AVI engine configuration
    // Generated by Helm Chart {{ .Chart.Name }}-{{ .Chart.Version }}

    postgis:
    {
        host             = "{{ .Values.smartmetConf.avi.engine.postgis.host }}";
        port             = {{ .Values.smartmetConf.avi.engine.postgis.port }};
        database         = "{{ .Values.smartmetConf.avi.engine.postgis.database }}";
        username         = "{{ .Values.smartmetConf.avi.engine.postgis.username }}";
        password         = "{{ .Values.smartmetConf.avi.engine.postgis.password }}";
        encoding         = "{{ .Values.smartmetConf.avi.engine.postgis.encoding }}";
        startconnections = {{ .Values.smartmetConf.avi.engine.postgis.startconnections }};
        maxconnections   = {{ .Values.smartmetConf.avi.engine.postgis.maxconnections }};
    };

    message:
    {
        maxstations                   = {{ .Values.smartmetConf.avi.engine.message.maxstations }};
        maxrows                       = {{ .Values.smartmetConf.avi.engine.message.maxrows }};
        recordsetstarttimeoffsethours = {{ .Values.smartmetConf.avi.engine.message.recordsetstarttimeoffsethours }};
        recordsetendtimeoffsethours   = {{ .Values.smartmetConf.avi.engine.message.recordsetendtimeoffsethours }};

        filter_FI_METARxxx =
        {
            filter       = true;
            excludeicaos = ["EFHF","EFUT"];
        };

        types =
        (
            {
                names         = [ "METAR","SPECI" ];
                timerangetype = "messagetime";
                validityhours = 2;
                latestmessage = true;
            },
            {
                name          = "AWSMETAR";
                timerangetype = "messagetime";
                validityhours = 2;
                latestmessage = true;
            },
            {
                name          = "TAF";
                timerangetype = "messagevalidtime";
                validityhours = 4;
                latestmessage = true;
                queryrestrictionhours        = [ 2,5,8,11,14,17,20,23 ];
                queryrestrictioncountrycodes = [ "FI" ];
                queryrestrictionstartminute  = 20;
                queryrestrictionendminute    = 40;
            },
            {
                names         = [ "METREP","SPECIAL" ];
                timerangetype = "validtime";
                latestmessage = true;
            },
            {
                name          = "ARS";
                timerangetype = "messagetime";
                validityhours = 2;
                latestmessage = false;
            },
            {
                name          = "WXREP";
                timerangetype = "messagetime";
                validityhours = 2;
                latestmessage = false;
            },
            {
                name          = "WRNG";
                timerangetype = "messagetime";
                validityhours = 2;
                latestmessage = false;
            },
            {
                name          = "SIGMET";
                timerangetype = "creationtime";
                latestmessage = false;
            },
            {
                name          = "VA-SIGMET";
                timerangetype = "creationtime";
                latestmessage = false;
            },
            {
                name           = "GAFOR";
                timerangetype  = "creationtime";
                latestmessage  = true;
                messirpatterns = [ "FBFI41%","FBFI42%","FBFI43%" ];
            },
            {
                name          = "LOWWIND";
                timerangetype = "messagetime";
                validityhours = 4;
                latestmessage = true;
            }
        );
    };
  avi-plugin.conf: |
    // SmartMet AVI plugin configuration
    // Generated by Helm Chart {{ .Chart.Name }}-{{ .Chart.Version }}

    message:
    {
        maxstations  = {{ .Values.smartmetConf.avi.plugin.message.maxstations }};
        maxrows      = {{ .Values.smartmetConf.avi.plugin.message.maxrows }};
        maxrangedays = {{ .Values.smartmetConf.avi.plugin.message.maxrangedays }};
    };

    multiplelocationoptions = {{ .Values.smartmetConf.avi.plugin.multiplelocationoptions }};
{{- end }}
